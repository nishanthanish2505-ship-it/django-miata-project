{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #1d2671, #131842);
}

.login-box {
    background: #fff;
    padding: 40px;
    width: 360px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.login-box h2 {
    text-align: center;
    margin-bottom: 30px;
    font-weight: 600;
}

.input-group {
    margin-bottom: 20px;
}

.input-group label {
    display: block;
    margin-bottom: 6px;
    font-size: 14px;
    color: #555;
}

.input-group input {
    width: 100%;
    padding: 12px;
    border-radius: 6px;
    border: 1px solid #ccc;
    outline: none;
    transition: 0.3s;
}

.input-group input:focus {
    border-color: #1d2671;
}

.login-btn {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 6px;
    background: #1d2671;
    color: #fff;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

.login-btn:hover {
    background: #142057;
}
</style>
</head>

<body>

<div class="login-box">
    <h2>Login</h2>

    <form method="POST" action="{% url 'login' %}">
        {% csrf_token %}

        <div class="input-group">
            <label><b>User ID</b></label>
            <input type="text" name="username" placeholder="Enter your ID" required>
        </div>

        <div class="input-group">
            <label><b>Password</b></label>
            <input type="password" name="password" placeholder="Enter your password" required>
        </div>

        <button type="submit" class="login-btn">Login</button>
    </form>
    <div class="signup-link"> Don’t have an account? <a href="{% url 'signup' %}">Register now</a> </div> </div>


</body>
</html>
